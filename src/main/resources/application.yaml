server:
  port: 8082  # 修改端口号为 8082
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true

spring:
  application:
    name: demo
  # 数据库连接配置
  datasource:
    url: jdbc:mysql://localhost:3306/ops_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true
    username: root
    password: "Wkm20040818@" # 请替换为你的本地 MySQL 密码
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA/Hibernate 配置
  jpa:
    hibernate:
      ddl-auto: update # 自动根据 Java 实体类在 MySQL 中建表或更新表结构
    show-sql: true     # 在控制台打印 Hibernate 生成的 SQL 语句
    properties:
      hibernate:
        format_sql: true # 格式化打印出的 SQL，使其更容易阅读